name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '9'

      - name: Install dependencies
        run: pnpm install

      - name: Run type check
        run: pnpm typecheck

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: typecheck

    strategy:
      matrix:
        project: [web, admin, api]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '9'

      - name: Install dependencies
        run: pnpm install

      - name: Build ${{ matrix.project }}
        run: pnpm build:${{ matrix.project }}
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8787
