name = "shopping-guide-api"
main = "src/index.ts"
compatibility_date = "2024-07-25"
compatibility_flags = ["nodejs_compat"]

[vars]
NEXT_PUBLIC_API_BASE_URL = "http://localhost:8787"
ADMIN_TOKEN_EXPIRES_IN = "86400"

[[kv_namespaces]]
binding = "DEALS_CACHE"
id = "deals-cache"
preview_id = "deals-cache-preview"

[[kv_namespaces]]
binding = "CONFIG_STORE"
id = "config-store"
preview_id = "config-store-preview"

[[kv_namespaces]]
binding = "ADMIN_KV"
id = "admin-kv"
preview_id = "admin-kv-preview"

[[d1_databases]]
binding = "DB"
database_name = "shopping-guide-db"
database_id = "shopping-guide-db-local"
preview_database_id = "DB"

[env.production]
name = "shopping-guide-api-production"

[env.staging]
name = "shopping-guide-api-staging"
